name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # Akkor fut le, ha a main ágra pusholsz code-ot
  workflow_dispatch: # Lehetővé teszi a manuális indítást is a GitHub felületéről

# Szükséges jogosultságok beállítása a tokenhez a Pages írásához
permissions:
  contents: read
  pages: write
  id-token: write

# Megakadályozza, hogy a párhuzamos buildelések összeakadjanak
concurrency:
  group: 'pages'
  cancel-in-progress: false

env:
  ASTRO_TELEMETRY_DISABLED: 1

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest # Ez a sor határozza meg a futtató környezetet, a hibás 'runs-edge' törlésre került
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro project
        run: npm run build

      - name: Upload production-ready artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Az Astro ide generálja a statikus HTML fájlokat

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
